<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Isha E-City Nurturing</title>
<link rel="stylesheet" href="styles.css?v=32">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<!-- Chart.js, xlsx, papaparse, qrcode and Tesseract are loaded on demand (see loadScript in app.js) -->
<script src="config.js"></script>
</head>
<body>

<!-- LOGIN -->
<div id="login-view" class="login-wrap hidden">
  <h1>🪷 Isha E-City</h1>
  <p>Nurturing &amp; Volunteer Dashboard</p>
  <div class="card">
    <label>Email</label><input id="login-email" type="email" autocomplete="email" placeholder="you@example.com">
    <label>Password</label><input id="login-pass" type="password" autocomplete="current-password">
    <button class="btn block" onclick="doLogin()">Sign in</button>
    <button class="btn ghost block" onclick="doSignup()">Create account</button>
    <p class="muted" style="margin-top:10px;text-align:center">New accounts start as Volunteer.<br>The RCO assigns your role and people.</p>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">
  <header id="topbar">
    <h1>🪷 E-City Nurturing</h1>
    <details class="menu avatar">
      <summary class="who-chip"><span id="who-name"></span> ▾</summary>
      <div class="menu-pop right">
        <div class="muted" id="who-role" style="padding:2px 4px 6px;font-size:.8rem"></div>
        <button class="btn small ghost" onclick="refreshNow()">↻ Refresh data</button>
        <button class="btn small gray" onclick="doLogout()">Sign out</button>
      </div>
    </details>
  </header>
  <div id="view"></div>
</div>

<nav id="nav" class="hidden">
  <button data-v="today"     onclick="go('today')"><span class="ico">📞</span><span>Today</span></button>
  <button data-v="people"    onclick="go('people')"><span class="ico">🧘</span><span>Meditators</span></button>
  <button data-v="vols"      onclick="go('vols')"><span class="ico">🙌</span><span>Volunteers</span></button>
  <button data-v="insights"  onclick="go('insights')"><span class="ico">📊</span><span>Insights</span></button>
  <button data-v="admin"     onclick="go('admin')"><span class="ico">⚙️</span><span>Admin</span></button>
</nav>

<div id="modal-root"></div>
<div id="toast"></div>

<script src="app.js?v=32" charset="utf-8"></script>
</body>
</html>
