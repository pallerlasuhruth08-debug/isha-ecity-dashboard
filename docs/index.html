<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Isha E-City Nurturing</title>
<!-- security hardening (defense-in-depth): block plugins/base-tag/cross-origin form posts,
     while staying permissive enough for the CDN libs, Supabase, OCR wasm/workers and inline handlers -->
<meta http-equiv="Content-Security-Policy" content="default-src 'self' https: data: blob:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https: blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data: https:; connect-src 'self' https: wss: data: blob:; media-src 'self' blob: data:; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'">
<meta name="referrer" content="strict-origin-when-cross-origin">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#7a4a2b">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="E-City">
<link rel="stylesheet" href="styles.css?v=66">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<!-- Chart.js, xlsx, papaparse, qrcode and Tesseract are loaded on demand (see loadScript in app.js) -->
<script src="config.js"></script>
</head>
<body>

<!-- LOGIN -->
<div id="login-view" class="login-wrap hidden">
  <h1>Isha E-City</h1>
  <p>Nurturing &amp; Volunteer Dashboard</p>
  <div class="card">
    <label for="login-email">Email</label><input id="login-email" type="email" autocomplete="email" placeholder="you@example.com">
    <label for="login-pass">Password</label><input id="login-pass" type="password" autocomplete="current-password">
    <button class="btn block" onclick="doLogin()">Sign in</button>
    <button class="btn ghost block" onclick="doSignup()">Create account</button>
    <div class="or-sep"><span>or</span></div>
    <button class="btn google block" onclick="doGoogleLogin()">
      <svg width="18" height="18" viewBox="0 0 48 48" aria-hidden="true">
        <path fill="#4285F4" d="M45.1 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h11.8c-.5 2.7-2 5-4.4 6.6v5.5h7.1c4.1-3.8 6.6-9.4 6.6-16.1z"/>
        <path fill="#34A853" d="M24 46c5.9 0 10.9-2 14.5-5.4l-7.1-5.5c-2 1.3-4.5 2.1-7.4 2.1-5.7 0-10.5-3.8-12.2-9H4.4v5.7C8 41.6 15.4 46 24 46z"/>
        <path fill="#FBBC05" d="M11.8 28.2c-.4-1.3-.7-2.7-.7-4.2s.2-2.9.7-4.2v-5.7H4.4C2.9 17 2 20.4 2 24s.9 7 2.4 9.9l7.4-5.7z"/>
        <path fill="#EA4335" d="M24 10.7c3.2 0 6.1 1.1 8.4 3.3l6.3-6.3C34.9 4.1 29.9 2 24 2 15.4 2 8 6.4 4.4 14.1l7.4 5.7c1.7-5.2 6.5-9.1 12.2-9.1z"/>
      </svg>
      <span>Continue with Google</span>
    </button>
    <p class="muted" style="margin-top:10px;text-align:center">New accounts start as Volunteer.<br>The RCO assigns your role and people.</p>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">
  <header id="topbar">
    <h1>🪷 E-City Nurturing</h1>
    <details class="menu avatar">
      <summary class="who-chip" aria-label="Account menu"><span id="who-name"></span> ▾</summary>
      <div class="menu-pop right">
        <div class="muted" id="who-role" style="padding:2px 4px 6px;font-size:.8rem"></div>
        <button class="btn small ghost" onclick="go('profile')">👤 My profile</button>
        <button class="btn small ghost" onclick="refreshNow()">↻ Refresh data</button>
        <button class="btn small gray" onclick="doLogout()">Sign out</button>
      </div>
    </details>
  </header>
  <div id="quotebar" class="hidden" onclick="showQuote(false)"></div>
  <div id="view"></div>
</div>

<div id="actionbar" class="actionbar hidden"></div>

<nav id="nav" class="hidden">
  <button data-v="today"     onclick="go('today')"><span class="ico">📞</span><span>Today</span></button>
  <button data-v="people"    onclick="go('people')"><span class="ico">🧘</span><span>Meditators</span></button>
  <button data-v="vols"      onclick="go('vols')"><span class="ico">🙌</span><span>Volunteers</span></button>
  <button data-v="insights"  onclick="go('insights')"><span class="ico">📊</span><span>Insights</span></button>
  <button data-v="admin"     onclick="go('admin')"><span class="ico">⚙️</span><span>Admin</span></button>
</nav>

<div id="modal-root"></div>
<div id="toast"></div>

<script src="app.js?v=66" charset="utf-8"></script>
<script>if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('sw.js').catch(function(){});});}</script>
</body>
</html>
